name: Build and Publish AppJuice Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: AppJuice source ref to build
        required: true
        default: master
      release_tag:
        description: Optional release tag override (defaults to v<source version>)
        required: false
        default: ""
  repository_dispatch:
    types:
      - publish-release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-x64
            os: macos-15-intel
            arch: x64
            asset_name: AppJuice-macOS-x64.dmg
          - id: macos-arm64
            os: macos-15
            arch: arm64
            asset_name: AppJuice-macOS-arm64.dmg
          - id: windows-x64
            os: windows-latest
            arch: x64
            asset_name: AppJuice-Windows-x64-Setup.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve source ref
        id: source
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.source_ref }}" ]; then
            printf 'ref=%s\n' "${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.source_ref }}" ]; then
            printf 'ref=%s\n' "${{ github.event.client_payload.source_ref }}" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=%s\n' "master" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve source repo token
        id: source_token
        shell: bash
        env:
          APPJUICE_REPO_TOKEN: ${{ secrets.APPJUICE_REPO_TOKEN }}
          UNIAPP_REPO_TOKEN: ${{ secrets.UNIAPP_REPO_TOKEN }}
        run: |
          TOKEN="$APPJUICE_REPO_TOKEN"
          if [ -z "$TOKEN" ]; then
            TOKEN="$UNIAPP_REPO_TOKEN"
          fi

          if [ -z "$TOKEN" ]; then
            echo "::error::Missing APPJUICE_REPO_TOKEN or UNIAPP_REPO_TOKEN secret with read access to herrkaefer/appjuice"
            exit 1
          fi

          printf 'token=%s\n' "$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Check out AppJuice source
        uses: actions/checkout@v6
        with:
          repository: herrkaefer/appjuice
          ref: ${{ steps.source.outputs.ref }}
          token: ${{ steps.source_token.outputs.token }}
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.1

      - name: Enable corepack pnpm
        shell: bash
        working-directory: source
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build Windows Electron app
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: source
        env:
          APPJUICE_BUNDLE_OFFLINE: "0"
          UNIAPP_BUNDLE_OFFLINE: "0"
        run: node scripts/build-electron-app.mjs --platform windows

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: source
        run: |
          choco install nsis --yes --no-progress

      - name: Build Windows Electron installer
        if: runner.os == 'Windows'
        id: windows_installer
        shell: pwsh
        working-directory: source
        run: |
          $outputFile = New-TemporaryFile
          node scripts/build-windows-installer.mjs --app-dir "artifacts\electron-windows\AppJuice" --output-file "$outputFile"
          $installerPath = (Get-Content $outputFile -Raw).Trim()
          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT

      - name: Build macOS Electron dmg
        if: runner.os == 'macOS'
        working-directory: source
        env:
          APPJUICE_BUNDLE_OFFLINE: "0"
          UNIAPP_BUNDLE_OFFLINE: "0"
        run: pnpm bundle:electron-macos-dmg

      - name: Stage release asset
        id: release_asset
        shell: bash
        working-directory: source
        run: |
          RELEASE_DIR="$RUNNER_TEMP/release-asset"
          mkdir -p "$RELEASE_DIR"
          TARGET="$RELEASE_DIR/${{ matrix.asset_name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            cp artifacts/electron-macos/AppJuice-Electron-*.dmg "$TARGET"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp "${{ steps.windows_installer.outputs.installer_path }}" "$TARGET"
          fi

          printf 'asset_path=%s\n' "$TARGET" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.id }}
          path: ${{ steps.release_asset.outputs.asset_path }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source ref
        id: source
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.source_ref }}" ]; then
            printf 'ref=%s\n' "${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.source_ref }}" ]; then
            printf 'ref=%s\n' "${{ github.event.client_payload.source_ref }}" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=%s\n' "master" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve source repo token
        id: source_token
        shell: bash
        env:
          APPJUICE_REPO_TOKEN: ${{ secrets.APPJUICE_REPO_TOKEN }}
          UNIAPP_REPO_TOKEN: ${{ secrets.UNIAPP_REPO_TOKEN }}
        run: |
          TOKEN="$APPJUICE_REPO_TOKEN"
          if [ -z "$TOKEN" ]; then
            TOKEN="$UNIAPP_REPO_TOKEN"
          fi

          if [ -z "$TOKEN" ]; then
            echo "::error::Missing APPJUICE_REPO_TOKEN or UNIAPP_REPO_TOKEN secret with read access to herrkaefer/appjuice"
            exit 1
          fi

          printf 'token=%s\n' "$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Check out AppJuice source
        uses: actions/checkout@v6
        with:
          repository: herrkaefer/appjuice
          ref: ${{ steps.source.outputs.ref }}
          token: ${{ steps.source_token.outputs.token }}
          path: source

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./source/package.json').version")"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          elif [ -n "${{ github.event.client_payload.release_tag }}" ]; then
            TAG="${{ github.event.client_payload.release_tag }}"
          else
            TAG="v$VERSION"
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Download staged release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG="${{ steps.release_meta.outputs.tag }}"
          TITLE="AppJuice ${{ steps.release_meta.outputs.version }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --repo "$REPO" --clobber
            gh release edit "$TAG" --repo "$REPO" --title "$TITLE" --latest
          else
            gh release create "$TAG" release-assets/* --repo "$REPO" --title "$TITLE" --generate-notes --latest
          fi
